<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>404 — Amir Razmjou</title>
<meta name="description" content="Page not found.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">

<link rel="icon" href="/favicon.png" type="image/png">
<link rel="shortcut icon" href="/favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f7f8fb;
  --surface: rgba(255, 255, 255, 0.65);
  --border: rgba(15, 23, 42, 0.10);
  --text: #10182b;
  --muted: #5a6478;
  --accent-1: #0d9488;
  --accent-2: #6366f1;
  --accent-3: #a855f7;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Inter", system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

main { position: relative; z-index: 1; }

.code {
  font-family: "Space Grotesk", sans-serif;
  font-weight: 700;
  font-size: clamp(90px, 22vw, 200px);
  line-height: 1;
  letter-spacing: -4px;
  background: linear-gradient(120deg, var(--text) 20%, var(--accent-2) 65%, var(--accent-3));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

p { color: var(--muted); margin: 18px 0 32px; font-size: 18px; }

.btn {
  display: inline-block;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  padding: 12px 24px;
  border-radius: 12px;
  border: 1px solid rgba(13, 148, 136, 0.40);
  background: linear-gradient(120deg, rgba(13, 148, 136, 0.10), rgba(99, 102, 241, 0.10));
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(13, 148, 136, 0.18);
}

.glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 60% 45% at 50% 35%, rgba(99, 102, 241, 0.08), transparent 65%);
}
</style>
</head>
<body>
<div class="glow" aria-hidden="true"></div>
<main>
  <div class="code">404</div>
  <p>Your pixels are in another canvas.</p>
  <a class="btn" href="/">Back home</a>
</main>
</body>
</html>
